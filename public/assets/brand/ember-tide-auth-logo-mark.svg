<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">

<defs>
  <linearGradient id="flameGrad" x1="55" y1="10" x2="155" y2="168" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#FFD36D"/>
    <stop offset="0.45" stop-color="#FF8A3D"/>
    <stop offset="1" stop-color="#E4572E"/>
  </linearGradient>
  <linearGradient id="waveGrad" x1="38" y1="126" x2="168" y2="150" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#7FD5CD"/>
    <stop offset="0.55" stop-color="#44B7B0"/>
    <stop offset="1" stop-color="#1A7C83"/>
  </linearGradient>
  <linearGradient id="darkBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#101B2C"/>
    <stop offset="1" stop-color="#050A12"/>
  </linearGradient>
  <linearGradient id="lightBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#FFF8EA"/>
    <stop offset="1" stop-color="#F7DDB8"/>
  </linearGradient>
  <linearGradient id="kidsBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#6B3EE8"/>
    <stop offset="1" stop-color="#1C1642"/>
  </linearGradient>
  <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="goldGlow" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.65 0 0 0.45  0 0 0.1 0 0.05  0 0 0 0.6 0" result="glow"/>
    <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    .serif { font-family: 'Noto Serif Display','EB Garamond','Georgia',serif; }
    .sans { font-family: 'Inter Display','Inter','Avenir Next','Helvetica Neue',Arial,sans-serif; }
    .smallcaps { letter-spacing: 3px; }
  </style>

  <g id="emberTideMark">
    <!-- protective outer ember -->
    <path d="M104 13
      C84 38 73 60 76 84
      C64 78 52 84 45 98
      C35 119 42 143 60 156
      C80 171 111 174 136 158
      C160 142 168 111 152 86
      C141 69 127 56 126 31
      C115 43 108 55 104 70
      C100 50 98 31 104 13Z" fill="url(#flameGrad)"/>
    <!-- inner spark cut, kept as deep navy for brand contrast -->
    <path d="M104 78
      C93 90 90 103 95 116
      C85 109 74 121 77 135
      C81 153 104 160 121 150
      C138 140 140 119 128 106
      C121 98 116 89 117 76
      C110 83 106 90 104 101
      C101 91 101 84 104 78Z" fill="#0B1523" opacity="0.96"/>
    <!-- tide wave cradle -->
    <path d="M43 139
      C62 126 82 126 101 140
      C121 155 143 152 163 128
      C155 154 131 169 102 168
      C77 167 57 157 43 139Z" fill="url(#waveGrad)"/>
    <path d="M55 146
      C72 138 88 139 104 149
      C120 158 139 156 153 141" fill="none" stroke="#B8FFF5" stroke-opacity="0.78" stroke-width="6" stroke-linecap="round"/>
    <!-- small kindness spark -->
    <path d="M151 37 L156 50 L169 55 L156 60 L151 73 L146 60 L133 55 L146 50 Z" fill="#F2C36B" opacity="0.9"/>
  </g>

  <g id="kidFace">
    <circle cx="88" cy="103" r="4" fill="#FFF6E6"/>
    <circle cx="120" cy="103" r="4" fill="#FFF6E6"/>
    <path d="M92 121 C100 130 113 130 121 121" stroke="#FFF6E6" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
</defs>

    <rect width="512" height="512" fill="none"/>
    <g transform="translate(35,28) scale(2.4)">
      <use href="#emberTideMark"/>
    </g>
    </svg>
