<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#04111f" />
    <title>Ember & Tide Offline</title>
    <style>
      :root {
        color: #f8fafc;
        background: #04111f;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at top left, rgba(255, 106, 19, 0.28), transparent 20rem),
          radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.2), transparent 22rem),
          linear-gradient(135deg, #061426, #04111f 58%, #020814);
      }

      main {
        width: min(460px, 100%);
        padding: 22px;
        border: 1px solid rgba(56, 189, 248, 0.18);
        border-radius: 22px;
        background: rgba(8, 34, 58, 0.86);
        box-shadow: 0 20px 45px rgba(13, 24, 40, 0.12);
      }

      img {
        width: 82px;
        height: 82px;
        margin-bottom: 10px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.7rem;
      }

      p {
        margin: 0 0 14px;
        color: rgba(248, 250, 252, 0.74);
        line-height: 1.45;
      }

      a {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border-radius: 999px;
        background: #ff6a13;
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="" />
      <h1>Ember & Tide is offline</h1>
      <p>Your beta app shell is available, but this page could not be loaded from the network. Reconnect and try again. Local beta data saved in your browser should still be there when the app opens.</p>
      <a href="/">Try opening Ember & Tide</a>
    </main>
  </body>
</html>
