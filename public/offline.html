<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2a2522" />
    <title>E&T TCG Offline</title>
    <style>
      :root {
        color: #162033;
        background: #fff7ef;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        background:
          radial-gradient(circle at top left, rgba(180, 87, 53, 0.18), transparent 20rem),
          radial-gradient(circle at bottom right, rgba(31, 111, 139, 0.18), transparent 22rem),
          #fff7ef;
      }

      main {
        width: min(460px, 100%);
        padding: 22px;
        border: 1px solid rgba(22, 32, 51, 0.12);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 45px rgba(13, 24, 40, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.7rem;
      }

      p {
        margin: 0 0 14px;
        color: #657286;
        line-height: 1.45;
      }

      a {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border-radius: 999px;
        background: #1f6f8b;
        color: #fff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>E&T TCG is offline</h1>
      <p>Your beta app shell is available, but this page could not be loaded from the network. Reconnect and try again. Local beta data saved in your browser should still be there when the app opens.</p>
      <a href="/">Try opening E&T TCG</a>
    </main>
  </body>
</html>
